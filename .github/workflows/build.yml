name: Build

# Verifies mss32.dll compiles on every push / PR to main.
# Uses MSYS2 MINGW32 (i686 gcc) — the same toolchain that builds locally,
# so the CI matches the dev machine instead of a different cross-compiler.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            mingw-w64-i686-gcc
            mingw-w64-i686-cmake
            mingw-w64-i686-ninja

      - name: Build mss32.dll
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja
          cmake --build build --target mss32 -j
          test -f build/mss32.dll

      - uses: actions/upload-artifact@v4
        with:
          name: mss32-dev
          path: build/mss32.dll
