name: Release

# Builds mss32.dll and attaches the assets to the release automatically.
#  - fires when you PUBLISH a release on GitHub (uses that release's tag), or
#  - run it by hand (Actions tab -> Release -> Run workflow) for an existing tag.
#
# Uses the stable Ubuntu i686-w64-mingw32 cross-compiler (the rolling msys2
# toolchain on windows runners ships a broken bleeding-edge gcc that fails to
# static-link, hence the cross-compile here).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build + attach assets to (e.g. 1.6.0)"
        required: true

permissions:
  contents: write   # required for gh release upload via GITHUB_TOKEN

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -z "$TAG" ] && TAG="${{ github.event.inputs.tag }}"
          TAG="${TAG#v}"                       # strip a leading 'v' if present
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "Building cod1reloaded $TAG"

      - name: Install 32-bit MinGW (stable) + tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-i686 cmake zip
          # match the local toolchain's POSIX threading model
          sudo update-alternatives --set i686-w64-mingw32-gcc /usr/bin/i686-w64-mingw32-gcc-posix || true
          sudo update-alternatives --set i686-w64-mingw32-g++ /usr/bin/i686-w64-mingw32-g++-posix || true

      - name: Build mss32.dll
        run: |
          # keep the compiled version in sync with the release tag
          sed -i "s/COD1RELOADED_VERSION = \"[^\"]*\"/COD1RELOADED_VERSION = \"$TAG\"/" src/features/updater.h
          cmake -S . -B build \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=i686-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=i686-w64-mingw32-g++ \
            -DCMAKE_RC_COMPILER=i686-w64-mingw32-windres
          cmake --build build --target mss32 -j
          test -f build/mss32.dll

      - name: Package assets
        run: |
          mkdir -p dist
          cp build/mss32.dll cod1reloaded.ini dist/
          printf '{\n  "version": "%s",\n  "download_url": "https://github.com/%s/releases/latest/download/mss32.dll",\n  "notes": "cod1reloaded %s - see CHANGELOG"\n}\n' \
            "$TAG" "$GITHUB_REPOSITORY" "$TAG" > dist/manifest.json
          ( cd dist && zip -q "cod1reloaded-$TAG.zip" mss32.dll cod1reloaded.ini )
          ls -l dist

      - name: Upload assets to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" \
            dist/mss32.dll \
            dist/cod1reloaded.ini \
            dist/manifest.json \
            "dist/cod1reloaded-$TAG.zip" \
            --clobber
